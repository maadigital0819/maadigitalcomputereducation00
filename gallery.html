<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maa Digital Computer Education – Gallery</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;600;700;800&family=Space+Grotesk:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/responsive.css">
</head>
<body>
    <header class="site-header">
        <div class="container header-inner">
            <a href="index.html" class="logo">
                <img src="images/logo.png" alt="Maa Digital Logo" loading="lazy">
            </a>
            <nav class="main-nav" aria-label="Primary Navigation">
                <ul>
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="admission.html">Admission</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="gallery.html" class="active">Gallery</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                </ul>
            </nav>
            <button class="nav-toggle" aria-label="Toggle navigation" aria-expanded="false">
                <span></span><span></span><span></span>
            </button>
        </div>
    </header>

    <main class="site-main">
        <section class="hero-section">
            <div class="container">
                <h1 class="hero-title">Our Gallery</h1>
                <p class="hero-subtitle">Explore our classrooms, labs, and events</p>
            </div>
        </section>

        <section class="gallery-section">
            <div class="container">
                <div class="gallery-grid">
                    <figure class="gallery-item" data-index="0">
                        <img src="images/gallery1.jpg" alt="Classroom session" loading="lazy">
                        <figcaption>Interactive classroom session</figcaption>
                    </figure>
                    <figure class="gallery-item" data-index="1">
                        <img src="images/gallery2.jpg" alt="Lab equipment" loading="lazy">
                        <figcaption>State‑of‑the‑art lab equipment</figcaption>
                    </figure>
                    <figure class="gallery-item" data-index="2">
                        <img src="images/gallery3.jpg" alt="Student event" loading="lazy">
                        <figcaption>Annual student tech event</figcaption>
                    </figure>
                </div>
            </div>
        </section>

        <!-- Lightbox Modal -->
        <div id="lightbox" class="lightbox hidden" aria-hidden="true">
            <button class="lightbox-close" aria-label="Close">&times;</button>
            <img class="lightbox-image" src="" alt="">
            <p class="lightbox-caption"></p>
            <button class="lightbox-prev" aria-label="Previous image">&#10094;</button>
            <button class="lightbox-next" aria-label="Next image">&#10095;</button>
        </div>
    </main>

    <footer class="site-footer">
        <div class="container footer-inner">
            <p>&copy; <span id="current-year"></span> Maa Digital Computer Education. All rights reserved.</p>
            <nav class="footer-nav" aria-label="Footer Navigation">
                <ul class="footer-list">
                    <li><a href="index.html">Home</a></li>
                    <li><a href="courses.html">Courses</a></li>
                    <li><a href="about.html">About Us</a></li>
                    <li><a href="contact.html">Contact Us</a></li>
                    <li><a href="gallery.html">Gallery</a></li>
                </ul>
            </nav>
        </div>
    </footer>

    <script src="js/mobile-optimizer.js"></script>
    <script src="js/main.js" type="module"></script>
    <script type="module">
        // Lightbox functionality (ES2022)
        class Lightbox {
            constructor() {
                this.modal = document.getElementById('lightbox');
                this.img = this.modal.querySelector('.lightbox-image');
                this.caption = this.modal.querySelector('.lightbox-caption');
                this.closeBtn = this.modal.querySelector('.lightbox-close');
                this.prevBtn = this.modal.querySelector('.lightbox-prev');
                this.nextBtn = this.modal.querySelector('.lightbox-next');
                this.galleryItems = Array.from(document.querySelectorAll('.gallery-item'));
                this.currentIndex = 0;

                this.attachEvents();
            }

            attachEvents() {
                this.galleryItems.forEach(item => {
                    item.addEventListener('click', () => this.open(parseInt(item.dataset.index, 10)));
                });

                this.closeBtn.addEventListener('click', () => this.close());
                this.prevBtn.addEventListener('click', () => this.prev());
                this.nextBtn.addEventListener('click', () => this.next());
                this.modal.addEventListener('click', (e) => {
                    if (e.target === this.modal) this.close();
                });
                document.addEventListener('keydown', (e) => {
                    if (this.modal.classList.contains('hidden')) return;
                    if (e.key === 'Escape') this.close();
                    if (e.key === 'ArrowLeft') this.prev();
                    if (e.key === 'ArrowRight') this.next();
                });
            }

            open(index) {
                this.currentIndex = index;
                const item = this.galleryItems[index];
                const img = item.querySelector('img');
                this.img.src = img.src;
                this.img.alt = img.alt;
                this.caption.textContent = item.querySelector('figcaption').textContent;
                this.modal.classList.remove('hidden');
                this.modal.setAttribute('aria-hidden', 'false');
            }

            close() {
                this.modal.classList.add('hidden');
                this.modal.setAttribute('aria-hidden', 'true');
            }

            prev() {
                const newIndex = (this.currentIndex - 1 + this.galleryItems.length) % this.galleryItems.length;
                this.open(newIndex);
            }

            next() {
                const newIndex = (this.currentIndex + 1) % this.galleryItems.length;
                this.open(newIndex);
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            new Lightbox();
            // Update footer year
            document.getElementById('current-year').textContent = new Date().getFullYear();
        });
    </script>
</body>
</html>
